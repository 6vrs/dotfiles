# DOCS --> https://github.com/dylanaraps/neofetch/wiki/Customizing-Info

print_info() {
    info title
    info underline

    info "OS" distro
    info "Uptime" uptime
    info "Packages" packages
    info "CPU Usage" cpu_usage
    info "Memory" memory
}

# Title
title_fqdn="off"

# Distro
distro_shorthand="tiny"
os_arch="off"

# Uptime
uptime_shorthand="on"

# Memory
memory_percent="on"
memory_unit="gib"

# Packages
package_managers="on"

# CPU
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="off"
cpu_speed="off"
cpu_cores="off"
cpu_temp="C"

# Ascii distro
ascii_distro="arch_small"